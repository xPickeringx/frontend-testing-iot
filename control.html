<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Control</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h1>Control Manual</h1>

<hr>

<div class="row g-3">

<button class="btn btn-success"
onclick="enviarMovimiento(1)">
Adelante
</button>

<button class="btn btn-danger"
onclick="enviarMovimiento(2)">
Atrás
</button>

<button class="btn btn-warning"
onclick="enviarMovimiento(3)">
Detener
</button>

<button class="btn btn-primary"
onclick="enviarMovimiento(4)">
90° Izquierda
</button>

<button class="btn btn-primary"
onclick="enviarMovimiento(5)">
90° Derecha
</button>

<button class="btn btn-secondary"
onclick="enviarMovimiento(6)">
360° Izquierda
</button>

<button class="btn btn-secondary"
onclick="enviarMovimiento(7)">
360° Derecha
</button>

<button class="btn btn-info"
onclick="enviarMovimiento(8)">
Adelante Izquierda
</button>

<button class="btn btn-info"
onclick="enviarMovimiento(9)">
Adelante Derecha
</button>

<button class="btn btn-dark"
onclick="enviarMovimiento(10)">
Atrás Izquierda
</button>

<button class="btn btn-dark"
onclick="enviarMovimiento(11)">
Atrás Derecha
</button>

</div>

</div>
<footer class="footer-iot mt-5">
    <div>
        <h4>CARTRONIX IoT</h4>
        <p>Sistema de control y monitoreo para carrito inteligente con ESP8266, Flask, WebSocket y MySQL/Aurora.</p>
    </div>

    <div class="footer-dev">
        <span>Desarrollado por</span>
        <strong>Angello Pickering</strong>
        <small>Programador Full Stack / IoT Developer</small>
    </div>
</footer>
<script src="./assets/js/control.js"></script>

</body>

</html>
